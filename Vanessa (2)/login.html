<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Sierra Walmart</title>
  <meta name="description" content="Sign in to your Sierra Walmart account to shop and manage your orders.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🛒</span>
        Sierra<span class="highlight">Walmart</span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>`n        <a href="sell.html">Sell</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="nav-actions">
        <button class="btn-icon dark-mode-toggle" title="Toggle Dark Mode">🌙</button>
        <a href="cart.html" class="btn-icon" title="Shopping Cart">
          🛒 <span class="cart-count" style="display:none">0</span>
        </a>
        <div class="nav-toggle" id="nav-toggle">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Login Form -->
  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div style="font-size:2.5rem;margin-bottom:var(--space-md)">👤</div>
        <h1>Welcome Back</h1>
        <p>Sign in to continue shopping at Sierra Walmart</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="Enter your email address">
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-toggle">
            <input type="password" id="login-password" class="form-control" placeholder="Enter your password">
            <span class="toggle-eye">👁</span>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-xl)">
          <label style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;color:var(--text-secondary);cursor:pointer">
            <input type="checkbox" style="accent-color:var(--primary-500)"> Remember me
          </label>
          <a href="#" style="font-size:0.85rem;color:var(--primary-500);font-weight:500" onclick="showToast('Password reset link sent to your email!', 'info'); return false;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
          Sign In →
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create Account</a>
      </div>
    </div>
  </section>

  <div class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
