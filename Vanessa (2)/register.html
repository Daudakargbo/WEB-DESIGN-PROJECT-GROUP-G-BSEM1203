<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Sierra Walmart</title>
  <meta name="description" content="Register for a Sierra Walmart account and start shopping online in Sierra Leone.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loading">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🛒</span>
        Sierra<span class="highlight">Walmart</span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>`n        <a href="sell.html">Sell</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="nav-actions">
        <button class="btn-icon dark-mode-toggle" title="Toggle Dark Mode">🌙</button>
        <a href="cart.html" class="btn-icon" title="Shopping Cart">
          🛒 <span class="cart-count" style="display:none">0</span>
        </a>
        <div class="nav-toggle" id="nav-toggle">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Registration Form -->
  <section class="auth-page">
    <div class="auth-card" style="max-width:500px">
      <div class="auth-header">
        <div style="font-size:2.5rem;margin-bottom:var(--space-md)">🎉</div>
        <h1>Create Account</h1>
        <p>Join Sierra Walmart and start shopping today</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="reg-name">Full Name *</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Enter your full name">
        </div>

        <div class="form-group">
          <label for="reg-email">Email Address *</label>
          <input type="email" id="reg-email" class="form-control" placeholder="Enter your email address">
        </div>

        <div class="form-group">
          <label for="reg-phone">Phone Number *</label>
          <input type="tel" id="reg-phone" class="form-control" placeholder="+232 76 xxx xxxx">
        </div>

        <div class="form-group">
          <label for="reg-password">Password *</label>
          <div class="password-toggle">
            <input type="password" id="reg-password" class="form-control" placeholder="Create a password (min 6 characters)">
            <span class="toggle-eye">👁</span>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-confirm-password">Confirm Password *</label>
          <div class="password-toggle">
            <input type="password" id="reg-confirm-password" class="form-control" placeholder="Confirm your password">
            <span class="toggle-eye">👁</span>
          </div>
        </div>

        <div style="margin-bottom:var(--space-xl)">
          <label style="display:flex;align-items:flex-start;gap:var(--space-sm);font-size:0.85rem;color:var(--text-secondary);cursor:pointer">
            <input type="checkbox" style="accent-color:var(--primary-500);margin-top:3px" required>
            <span>I agree to the <a href="#" style="color:var(--primary-500)">Terms & Conditions</a> and <a href="#" style="color:var(--primary-500)">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">
          Create Account →
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </section>

  <div class="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
